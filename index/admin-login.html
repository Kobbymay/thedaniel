<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <main class="l-main">
        <section class="contact section" id="admin-login">
            <h2 class="section-title">Admin Login</h2>
            <div class="contact__container bd-grid">
                <form id="adminLoginForm" class="contact__form" style="max-width:350px;margin:auto;">
                    <input type="text" id="adminUsername" class="contact__input" placeholder="Username" required>
                    <input type="password" id="adminPassword" class="contact__input" placeholder="Password" required>
                    <input type="submit" value="Login" class="contact__button button">
                    <p id="loginError" style="color:#FFD700;display:none;margin-top:1rem;">Invalid credentials!</p>
                </form>
            </div>
        </section>
    </main>
    <script>
    // Set your admin credentials here
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "password123";

    document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('adminUsername').value.trim();
        const password = document.getElementById('adminPassword').value;
        if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
            localStorage.setItem('isAdmin', 'true');
            window.location.href = "admin.html";
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    });
    </script>
</body>
</html>
